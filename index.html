<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🦂 Monitor Escorpiões Brasil</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#081226,#0f172a);
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:0 auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:2rem;
    margin-bottom:15px;
}

.info-box{
    background:#132347;
    border:1px solid rgba(96,165,250,.25);
    border-radius:12px;
    padding:16px;
    margin-bottom:15px;
}

.info-box strong{
    color:#60a5fa;
}

.schedule-info{
    background:rgba(16,185,129,.12);
    border:1px solid rgba(16,185,129,.35);
    color:#86efac;
    border-radius:10px;
    padding:12px;
    margin-bottom:25px;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;
    margin-bottom:25px;
}

.card{
    background:#0f1d3a;
    border:1px solid rgba(148,163,184,.15);
    border-radius:12px;
    padding:18px;
    text-align:center;
}

.card-title{
    font-size:1.3rem;
    color:#60a5fa;
    margin-bottom:10px;
    font-weight:bold;
}

.card-number{
    font-size:2rem;
    font-weight:bold;
    color:#fbbf24;
}

.filters{
    background:#0f1d3a;
    border-radius:12px;
    padding:18px;
    margin-bottom:25px;
    border:1px solid rgba(148,163,184,.15);
}

.filters-grid{
    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:12px;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#132347;
    color:white;
    font-size:.95rem;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.btn-clear{
    background:#ef4444;
    color:white;
}

.btn-clear:hover{
    opacity:.9;
}

.news-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.news-card{
    background:#0f1d3a;
    border-left:5px solid #f59e0b;
    border-radius:12px;
    padding:18px;
}

.news-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:15px;
    margin-bottom:10px;
}

.news-title{
    color:#60a5fa;
    font-size:1.05rem;
    font-weight:bold;
    line-height:1.4;
}

.badge{
    padding:5px 10px;
    border-radius:8px;
    font-size:.75rem;
    font-weight:bold;
    white-space:nowrap;
}

.leve{
    background:#10b981;
    color:black;
}

.moderada{
    background:#f59e0b;
    color:black;
}

.grave{
    background:#ef4444;
    color:white;
}

.news-description{
    color:#cbd5e1;
    margin-bottom:12px;
    line-height:1.5;
}

.news-details{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    font-size:.85rem;
    color:#94a3b8;
    margin-bottom:15px;
}

.news-link{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.news-link:hover{
    background:#1d4ed8;
}

.loading{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

@media(max-width:768px){

    .filters-grid{
        grid-template-columns:1fr;
    }

    .news-header{
        flex-direction:column;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🦂 Monitor Escorpiões Brasil</h1>

        <div class="info-box">
            <div>
                <strong>📊 Total de notícias:</strong>
                <span id="totalNoticias">Carregando...</span>
            </div>

            <div id="lastUpdate" style="margin-top:8px;font-size:.85rem;color:#94a3b8;"></div>
        </div>

        <div class="schedule-info">
            ✅ Atualiza automaticamente às 08:30 e 16:30 (Horário Brasília)
        </div>
    </div>

    <div id="cardsEstados" class="cards-grid"></div>

    <div class="filters">

        <div class="filters-grid">

            <input
                type="text"
                id="searchInput"
                placeholder="🔎 Buscar cidade, estado, título ou palavra-chave..."
            >

            <select id="estadoFilter">
                <option value="all">🗺️ Todos os estados</option>
            </select>

            <select id="gravidadeFilter">
                <option value="all">⚠️ Todas gravidades</option>
                <option value="leve">Leve</option>
                <option value="moderada">Moderada</option>
                <option value="grave">Grave</option>
            </select>

            <button class="btn-clear" onclick="limparFiltros()">
                Limpar
            </button>

        </div>

    </div>

    <div id="conteudoNoticias" class="news-list">

        <div class="loading">
            Carregando notícias...
        </div>

    </div>

</div>

<script>

let noticias = [];

async function carregarNoticias(){

    try{

        const response = await fetch(
            'noticias.json?v=' + Date.now()
        );

        noticias = await response.json();

        document.getElementById('totalNoticias').innerText = noticias.length;

        document.getElementById('lastUpdate').innerText =
            '📅 ' + new Date().toLocaleString('pt-BR');

        renderizarEstados();

        popularEstados();

        renderizarNoticias();

    }catch(e){

        console.error(e);

        document.getElementById('conteudoNoticias').innerHTML = `
            <div class="loading">
                ❌ Erro ao carregar notícias
            </div>
        `;
    }
}

function renderizarEstados(){

    const estados = {};

    noticias.forEach(n=>{

        const uf = n.estado || 'Nacional';

        if(!estados[uf]){
            estados[uf] = 0;
        }

        estados[uf]++;
    });

    let html = '';

    Object.entries(estados)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([uf,total])=>{

        html += `
            <div class="card">
                <div class="card-title">${uf}</div>
                <div class="card-number">${total}</div>
            </div>
        `;
    });

    document.getElementById('cardsEstados').innerHTML = html;
}

function popularEstados(){

    const select = document.getElementById('estadoFilter');

    const estados = [
        ...new Set(
            noticias.map(n=>n.estado || 'Nacional')
        )
    ].sort();

    estados.forEach(uf=>{

        const option = document.createElement('option');

        option.value = uf;

        option.textContent = uf;

        select.appendChild(option);
    });
}

function renderizarNoticias(){

    const busca = document
        .getElementById('searchInput')
        .value
        .toLowerCase();

    const estado = document
        .getElementById('estadoFilter')
        .value;

    const gravidade = document
        .getElementById('gravidadeFilter')
        .value;

    let filtradas = noticias.filter(n=>{

        const texto = `
            ${n.titulo}
            ${n.descricao}
            ${n.estado}
            ${n.cidade}
        `.toLowerCase();

        const matchBusca =
            texto.includes(busca);

        const matchEstado =
            estado === 'all' ||
            n.estado === estado;

        const matchGravidade =
            gravidade === 'all' ||
            n.gravidade === gravidade;

        return matchBusca &&
               matchEstado &&
               matchGravidade;

    });

    filtradas.sort((a,b)=>{

        const da = new Date(
            a.data.split('/').reverse().join('-')
        );

        const db = new Date(
            b.data.split('/').reverse().join('-')
        );

        return db - da;
    });

    if(filtradas.length === 0){

        document.getElementById('conteudoNoticias').innerHTML = `
            <div class="loading">
                Nenhuma notícia encontrada.
            </div>
        `;

        return;
    }

    let html = '';

    filtradas.forEach(n=>{

        html += `
            <div class="news-card">

                <div class="news-header">

                    <div class="news-title">
                        ${n.titulo}
                    </div>

                    <div class="badge ${n.gravidade}">
                        ${n.gravidade.toUpperCase()}
                    </div>

                </div>

                <div class="news-description">
                    ${n.descricao || ''}
                </div>

                <div class="news-details">

                    <span>
                        📍 ${n.cidade || 'Não identificada'}
                        -
                        ${n.estado || 'Nacional'}
                    </span>

                    <span>
                        📅 ${n.data}
                    </span>

                    <span>
                        📰 ${n.fonte}
                    </span>

                </div>

                <a
                    href="${n.link}"
                    target="_blank"
                    class="news-link"
                >
                    🔗 Leia a notícia
                </a>

            </div>
        `;
    });

    document.getElementById('conteudoNoticias').innerHTML = html;
}

function limparFiltros(){

    document.getElementById('searchInput').value = '';

    document.getElementById('estadoFilter').value = 'all';

    document.getElementById('gravidadeFilter').value = 'all';

    renderizarNoticias();
}

document
.getElementById('searchInput')
.addEventListener('input',renderizarNoticias);

document
.getElementById('estadoFilter')
.addEventListener('change',renderizarNoticias);

document
.getElementById('gravidadeFilter')
.addEventListener('change',renderizarNoticias);

carregarNoticias();

</script>

</body>
</html>
