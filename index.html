<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦂 Monitor Escorpiões Brasil</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:linear-gradient(135deg,#081226,#0f172a);
    color:#e2e8f0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:16px;
}

.container{max-width:1200px;margin:0 auto}

.header{text-align:center;margin-bottom:18px}
.header h1{font-size:1.8rem;margin-bottom:12px}

.info-box{
    background:#132347;
    border:1px solid rgba(96,165,250,.25);
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
}

.info-box strong{color:#60a5fa}

.schedule-info{
    background:rgba(16,185,129,.12);
    border:1px solid rgba(16,185,129,.35);
    color:#86efac;
    border-radius:8px;
    padding:9px;
    font-size:.85rem;
    margin-bottom:18px;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(115px,1fr));
    gap:10px;
    margin-bottom:18px;
}

.card{
    background:#0f1d3a;
    border:1px solid rgba(148,163,184,.18);
    border-radius:10px;
    padding:10px 8px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:translateY(-2px);
    border-color:#3b82f6;
}

.card-title{
    font-size:1rem;
    color:#60a5fa;
    font-weight:bold;
    margin-bottom:4px;
}

.card-number{
    font-size:1.45rem;
    font-weight:bold;
    color:#fbbf24;
    line-height:1.2;
}

.card-gravity{
    margin-top:6px;
    font-size:.72rem;
    color:#cbd5e1;
    display:flex;
    justify-content:center;
    gap:6px;
    white-space:nowrap;
}

.filters{
    background:#0f1d3a;
    border-radius:10px;
    padding:14px;
    margin-bottom:18px;
    border:1px solid rgba(148,163,184,.15);
}

.filters-grid{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr auto;
    gap:10px;
}

input,select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#132347;
    color:white;
    font-size:.9rem;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    font-weight:bold;
    cursor:pointer;
}

.btn-clear{
    background:#ef4444;
    color:white;
}

.news-title-section{
    font-size:1.2rem;
    margin-bottom:12px;
}

.news-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.news-card{
    background:#0f1d3a;
    border-left:5px solid #f59e0b;
    border-radius:10px;
    padding:15px;
}

.news-card.grave{border-left-color:#ef4444}
.news-card.moderada{border-left-color:#f59e0b}
.news-card.leve{border-left-color:#10b981}

.news-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:8px;
}

.news-title{
    color:#60a5fa;
    font-size:1rem;
    font-weight:bold;
    line-height:1.35;
}

.badge{
    padding:4px 9px;
    border-radius:7px;
    font-size:.72rem;
    font-weight:bold;
    white-space:nowrap;
}

.badge.leve{background:#10b981;color:black}
.badge.moderada{background:#f59e0b;color:black}
.badge.grave{background:#ef4444;color:white}

.news-description{
    color:#cbd5e1;
    margin-bottom:10px;
    line-height:1.45;
    font-size:.9rem;
}

.news-details{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    font-size:.82rem;
    color:#94a3b8;
    margin-bottom:12px;
}

.news-link{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:8px 12px;
    border-radius:7px;
    text-decoration:none;
    font-weight:bold;
    font-size:.85rem;
}

.loading{
    text-align:center;
    padding:35px;
    color:#94a3b8;
}

@media(max-width:900px){
    .filters-grid{grid-template-columns:1fr}
    .cards-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}
    .card-gravity{font-size:.68rem;gap:4px}
    .news-header{flex-direction:column}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🦂 Monitor Escorpiões Brasil</h1>

        <div class="info-box">
            <div><strong>📊 Total de notícias:</strong> <span id="totalNoticias">Carregando...</span></div>
            <div id="lastUpdate" style="margin-top:6px;font-size:.82rem;color:#94a3b8;"></div>
        </div>

        <div class="schedule-info">
            ✅ As notícias são atualizadas diariamente às 08:30 e 16:30 ✅ 
        </div>
    </div>

    <div id="cardsEstados" class="cards-grid"></div>

    <div class="filters">
        <div class="filters-grid">
            <input id="searchInput" type="text" placeholder="🔎 Buscar cidade, estado, título, fonte ou palavra-chave...">

            <select id="estadoFilter">
                <option value="all">🗺️ Todos os estados</option>
            </select>

            <select id="cidadeFilter">
                <option value="all">🏙️ Todas as cidades</option>
            </select>

            <select id="gravidadeFilter">
                <option value="all">⚠️ Todas gravidades</option>
                <option value="grave">Grave</option>
                <option value="moderada">Moderada</option>
                <option value="leve">Leve</option>
            </select>

            <button class="btn-clear" onclick="limparFiltros()">Limpar</button>
        </div>
    </div>

    <h2 class="news-title-section">
        📰 Notícias encontradas: <span id="totalFiltradas">0</span>
    </h2>

    <div id="conteudoNoticias" class="news-list">
        <div class="loading">Carregando notícias...</div>
    </div>

</div>

<script>
let noticias = [];

async function carregarNoticias(){
    try{
        const response = await fetch('noticias.json?v=' + Date.now());

        if(!response.ok){
            throw new Error('Arquivo noticias.json não encontrado');
        }

        noticias = await response.json();

        document.getElementById('totalNoticias').innerText = noticias.length;
        document.getElementById('lastUpdate').innerText =
            '📅 Atualizado em tela: ' + new Date().toLocaleString('pt-BR');

        renderizarEstados();
        popularEstados();
        popularCidades();
        renderizarNoticias();

    }catch(e){
        console.error(e);
        document.getElementById('totalNoticias').innerText = '0';
        document.getElementById('conteudoNoticias').innerHTML =
            '<div class="loading">❌ Erro ao carregar notícias. Verifique o noticias.json.</div>';
    }
}

function renderizarEstados(){
    const estados = {};

    noticias.forEach(n=>{
        const uf = n.estado || 'Nacional';
        const gravidade = n.gravidade || 'moderada';

        if(!estados[uf]){
            estados[uf] = {
                total:0,
                grave:0,
                moderada:0,
                leve:0
            };
        }

        estados[uf].total++;

        if(gravidade === 'grave') estados[uf].grave++;
        else if(gravidade === 'leve') estados[uf].leve++;
        else estados[uf].moderada++;
    });

    let html = '';

    Object.entries(estados)
        .sort((a,b)=>b[1].total - a[1].total)
        .forEach(([uf,dados])=>{
            html += `
                <div class="card" onclick="filtrarPorEstado('${uf}')">
                    <div class="card-title">${uf}</div>
                    <div class="card-number">${dados.total}</div>
                    <div class="card-gravity">
                        <span>🔴 ${dados.grave}</span>
                        <span>🟡 ${dados.moderada}</span>
                        <span>🟢 ${dados.leve}</span>
                    </div>
                </div>
            `;
        });

    document.getElementById('cardsEstados').innerHTML = html;
}

function popularEstados(){
    const select = document.getElementById('estadoFilter');
    select.innerHTML = '<option value="all">🗺️ Todos os estados</option>';

    const estados = [...new Set(noticias.map(n=>n.estado || 'Nacional'))].sort();

    estados.forEach(uf=>{
        const option = document.createElement('option');
        option.value = uf;
        option.textContent = uf;
        select.appendChild(option);
    });
}

function popularCidades(){
    const select = document.getElementById('cidadeFilter');
    const estadoAtual = document.getElementById('estadoFilter').value;

    select.innerHTML = '<option value="all">🏙️ Todas as cidades</option>';

    let cidades = noticias
        .filter(n=>{
            if(estadoAtual === 'all') return true;
            return (n.estado || 'Nacional') === estadoAtual;
        })
        .map(n=>n.cidade || 'Não identificada')
        .filter(c=>c && c !== 'Não identificada');

    cidades = [...new Set(cidades)].sort();

    cidades.forEach(cidade=>{
        const option = document.createElement('option');
        option.value = cidade;
        option.textContent = cidade;
        select.appendChild(option);
    });
}

function renderizarNoticias(){
    const busca = document.getElementById('searchInput').value.toLowerCase().trim();
    const estado = document.getElementById('estadoFilter').value;
    const cidade = document.getElementById('cidadeFilter').value;
    const gravidade = document.getElementById('gravidadeFilter').value;

    let filtradas = noticias.filter(n=>{
        const texto = `
            ${n.titulo || ''}
            ${n.descricao || ''}
            ${n.estado || ''}
            ${n.cidade || ''}
            ${n.fonte || ''}
            ${n.termo_busca || ''}
        `.toLowerCase();

        const matchBusca = busca === '' || texto.includes(busca);
        const matchEstado = estado === 'all' || (n.estado || 'Nacional') === estado;
        const matchCidade = cidade === 'all' || (n.cidade || 'Não identificada') === cidade;
        const matchGravidade = gravidade === 'all' || (n.gravidade || 'moderada') === gravidade;

        return matchBusca && matchEstado && matchCidade && matchGravidade;
    });

    filtradas.sort((a,b)=>{
        const da = converterData(a.data);
        const db = converterData(b.data);
        return db - da;
    });

    document.getElementById('totalFiltradas').innerText = filtradas.length;

    if(filtradas.length === 0){
        document.getElementById('conteudoNoticias').innerHTML =
            '<div class="loading">Nenhuma notícia encontrada com os filtros atuais.</div>';
        return;
    }

    let html = '';

    filtradas.forEach(n=>{
        const gravidade = n.gravidade || 'moderada';

        html += `
            <div class="news-card ${gravidade}">
                <div class="news-header">
                    <div class="news-title">${n.titulo || 'Sem título'}</div>
                    <div class="badge ${gravidade}">${gravidade.toUpperCase()}</div>
                </div>

                <div class="news-description">
                    ${n.descricao || n.titulo || ''}
                </div>

                <div class="news-details">
                    <span>📍 ${n.cidade || 'Não identificada'} - ${n.estado || 'Nacional'}</span>
                    <span>📅 ${n.data || 'Sem data'}</span>
                    <span>📰 ${n.fonte || 'Fonte não identificada'}</span>
                </div>

                <a href="${n.link || '#'}" target="_blank" class="news-link">
                    🔗 Leia a notícia
                </a>
            </div>
        `;
    });

    document.getElementById('conteudoNoticias').innerHTML = html;
}

function converterData(data){
    if(!data || !data.includes('/')){
        return new Date(0);
    }

    const partes = data.split('/');

    return new Date(`${partes[2]}-${partes[1]}-${partes[0]}`);
}

function limparFiltros(){
    document.getElementById('searchInput').value = '';
    document.getElementById('estadoFilter').value = 'all';
    document.getElementById('cidadeFilter').value = 'all';
    document.getElementById('gravidadeFilter').value = 'all';
    popularCidades();
    renderizarNoticias();
}

function filtrarPorEstado(uf){
    document.getElementById('estadoFilter').value = uf;
    popularCidades();
    document.getElementById('cidadeFilter').value = 'all';
    renderizarNoticias();

    window.scrollTo({
        top: document.querySelector('.filters').offsetTop - 10,
        behavior: 'smooth'
    });
}

document.getElementById('searchInput').addEventListener('input',renderizarNoticias);

document.getElementById('estadoFilter').addEventListener('change',()=>{
    popularCidades();
    document.getElementById('cidadeFilter').value = 'all';
    renderizarNoticias();
});

document.getElementById('cidadeFilter').addEventListener('change',renderizarNoticias);
document.getElementById('gravidadeFilter').addEventListener('change',renderizarNoticias);

carregarNoticias();
</script>

</body>
</html>
