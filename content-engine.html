<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine NOPRAX 🦂</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:linear-gradient(135deg, #081226, #0f172a);
            color:#e2e8f0;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            padding:16px;
            min-height:100vh;
        }
        .container{max-width:1200px;margin:0 auto}
        
        .header{text-align:center;margin-bottom:25px;padding:20px;background:#132347;border-radius:10px;border:1px solid rgba(96,165,250,.25)}
        .header h1{font-size:1.8rem;margin-bottom:8px;color:#60a5fa}
        .header p{color:#cbd5e1;font-size:.9rem}
        
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        
        .panel{background:#0f1d3a;border:1px solid rgba(96,165,250,.25);border-radius:10px;padding:20px}
        .panel-title{font-size:1.15rem;color:#60a5fa;margin-bottom:16px;font-weight:bold;display:flex;align-items:center;gap:8px}
        
        /* EDITOR */
        .editor{background:#132347;border:1px solid rgba(96,165,250,.15);border-radius:8px;padding:14px;margin-bottom:12px}
        .editor-label{font-size:.82rem;color:#60a5fa;margin-bottom:6px;font-weight:bold}
        textarea,input{
            width:100%;
            padding:10px;
            background:#0f1d3a;
            border:1px solid rgba(96,165,250,.2);
            border-radius:6px;
            color:#e2e8f0;
            font-family:inherit;
            font-size:.9rem;
            resize:vertical;
            margin-bottom:8px;
        }
        textarea{min-height:120px;line-height:1.5}
        
        .editor-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;font-size:.8rem}
        .stat{background:#0f1d3a;border:1px solid rgba(96,165,250,.2);border-radius:6px;padding:8px;text-align:center;color:#94a3b8}
        
        .buttons{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        button{
            padding:9px 14px;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            font-size:.85rem;
            transition:all .3s;
        }
        .btn-primary{background:#3b82f6;color:white}
        .btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
        .btn-success{background:#10b981;color:black;font-weight:bold}
        .btn-success:hover{background:#059669}
        .btn-danger{background:#ef4444;color:white}
        .btn-danger:hover{background:#dc2626}
        .btn-secondary{background:#64748b;color:white;font-size:.8rem}
        .btn-secondary:hover{background:#475569}
        
        /* NOTÍCIAS */
        .noticias-container{background:#132347;border:1px solid rgba(96,165,250,.15);border-radius:8px;padding:14px;max-height:500px;overflow-y:auto}
        
        .noticia-item{
            background:#0f1d3a;
            border-left:3px solid;
            border-radius:6px;
            padding:11px;
            margin-bottom:8px;
            cursor:pointer;
            transition:all .2s;
        }
        .noticia-item:hover{transform:translateX(2px);background:#1a2d47}
        .noticia-item.selected{background:#1e3a5f;border-left-color:#3b82f6}
        
        .noticia-item.grave{border-left-color:#ef4444}
        .noticia-item.moderada{border-left-color:#f59e0b}
        .noticia-item.leve{border-left-color:#10b981}
        
        .noticia-titulo{font-weight:bold;color:#60a5fa;margin-bottom:4px;font-size:.9rem;line-height:1.3}
        .noticia-meta{font-size:.75rem;color:#94a3b8;display:flex;gap:8px;flex-wrap:wrap}
        .noticia-badge{padding:2px 6px;border-radius:3px;font-size:.7rem;font-weight:bold}
        .badge-grave{background:#ef4444;color:white}
        .badge-moderada{background:#f59e0b;color:black}
        
        .pagination{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
        .page-btn{padding:6px 10px;background:#132347;border:1px solid rgba(96,165,250,.2);border-radius:5px;cursor:pointer;color:#94a3b8;font-size:.8rem;font-weight:bold}
        .page-btn.active{background:#3b82f6;color:white;border-color:#3b82f6}
        .page-btn:hover{border-color:rgba(96,165,250,.5)}
        
        /* PREVIEW */
        .preview{background:#132347;border:1px solid rgba(96,165,250,.15);border-radius:8px;padding:14px;max-height:500px;overflow-y:auto;font-size:.9rem;line-height:1.6;font-family:"Georgia","Times New Roman",serif}
        .preview-empty{color:#94a3b8;text-align:center;padding:30px;font-style:italic}
        
        .preview-titulo{font-size:1.3rem;color:#fbbf24;margin-bottom:10px;font-weight:bold;line-height:1.3;font-family:inherit}
        .preview-content{color:#cbd5e1;margin-bottom:12px}
        .preview-content p{margin-bottom:10px}
        .preview-cta{background:rgba(16,185,129,.15);border-left:3px solid #10b981;padding:10px;border-radius:5px;color:#e0e7ff;font-size:.85rem;margin-top:12px;font-family:inherit}
        
        .message{padding:10px;border-radius:6px;margin-bottom:12px;font-size:.85rem;display:none}
        .message.success{background:rgba(16,185,129,.2);border:1px solid #10b981;color:#86efac;display:block}
        .message.error{background:rgba(239,68,68,.2);border:1px solid #ef4444;color:#fca5a5;display:block}
        .message.info{background:rgba(59,130,246,.2);border:1px solid #3b82f6;color:#93c5fd;display:block}
        
        .loading{text-align:center;padding:20px;color:#94a3b8;font-size:.9rem}
        .spinner{border:3px solid rgba(59,130,246,.2);border-top:3px solid #60a5fa;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:10px auto}
        @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
        
        @media(max-width:1000px){
            .grid-2{grid-template-columns:1fr}
            .noticias-container{max-height:none}
            .preview{max-height:none}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦂 Content Engine NOPRAX</h1>
            <p>Gere artigos únicos a partir de notícias reais sobre escorpiões</p>
        </div>

        <div id="messageContainer"></div>

        <!-- EDITOR (TOPO) -->
        <div class="panel">
            <div class="panel-title">✏️ Editor de Artigo</div>
            
            <div class="editor">
                <div class="editor-label">Título</div>
                <input type="text" id="editorTitulo" placeholder="Título do artigo...">
            </div>

            <div class="editor">
                <div class="editor-label">Meta Description (SEO)</div>
                <textarea id="editorMeta" placeholder="Resumo para mecanismos de busca..."></textarea>
            </div>

            <div class="editor">
                <div class="editor-label">Conteúdo Principal</div>
                <textarea id="editorConteudo" placeholder="Corpo do artigo..."></textarea>
            </div>

            <div class="editor-stats">
                <div class="stat">
                    <div style="font-size:.7rem;color:#60a5fa;margin-bottom:3px">Meta</div>
                    <div id="metaCount">0/160</div>
                </div>
                <div class="stat">
                    <div style="font-size:.7rem;color:#60a5fa;margin-bottom:3px">Palavras</div>
                    <div id="palavrasCount">0</div>
                </div>
                <div class="stat">
                    <div style="font-size:.7rem;color:#60a5fa;margin-bottom:3px">Leitura</div>
                    <div id="tempoLeitura">0 min</div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-secondary" onclick="gerarNovoArtigo()">🔄 Regenerar</button>
                <button class="btn-secondary" onclick="salvarRascunho()">💾 Rascunho</button>
                <button class="btn-success" onclick="copiarParaClipboard()">📋 Copiar Conteúdo</button>
                <button class="btn-danger" onclick="rejeitarArtigo()">❌ Rejeitar</button>
            </div>
        </div>

        <!-- SELEÇÃO + PREVIEW -->
        <div class="grid-2">
            <!-- NOTÍCIAS -->
            <div class="panel">
                <div class="panel-title">📰 Notícias (Grave/Moderada)</div>
                <div id="listaNoticiasContainer" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="panel">
                <div class="panel-title">👁️ Preview</div>
                <div id="previewArtigo" class="preview">
                    <div class="preview-empty">Selecione uma notícia</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let noticias = [];
        let artigosGerados = [];
        let artigoAtual = null;
        let noticiaAtualId = null;
        let paginaAtual = 1;
        const itensPorPagina = 10;

        document.addEventListener('DOMContentLoaded', carregarDados);

        function mostrarMensagem(texto, tipo = 'info') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${tipo}">${texto}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }

        async function carregarDados() {
            try {
                const response = await fetch('noticias.json?v=' + Date.now());
                if (!response.ok) throw new Error('Arquivo não encontrado');
                
                let allNoticias = await response.json();
                
                // Filtrar grave E moderada
                noticias = allNoticias.filter(n => n.gravidade === 'grave' || n.gravidade === 'moderada');
                
                // Ordenar por data
                noticias.sort((a, b) => {
                    const dataA = new Date(a.data.split('/').reverse().join('-'));
                    const dataB = new Date(b.data.split('/').reverse().join('-'));
                    return dataB - dataA;
                });

                paginaAtual = 1;
                renderizarPagina();
            } catch (e) {
                console.error('Erro:', e);
                mostrarMensagem('❌ Erro ao carregar noticias.json. Verifique se está na mesma pasta.', 'error');
            }
        }

        function renderizarPagina() {
            const inicio = (paginaAtual - 1) * itensPorPagina;
            const fim = inicio + itensPorPagina;
            const noticiasPagina = noticias.slice(inicio, fim);
            const totalPaginas = Math.ceil(noticias.length / itensPorPagina);

            let html = '<div class="noticias-container">';
            
            noticiasPagina.forEach((n, idx) => {
                const idReal = inicio + idx;
                const gravidade = n.gravidade || 'moderada';
                const classBadge = gravidade === 'grave' ? 'badge-grave' : 'badge-moderada';
                
                html += `
                    <div class="noticia-item ${gravidade} ${noticiaAtualId === idReal ? 'selected' : ''}" onclick="selecionarNoticia(${idReal})">
                        <div class="noticia-titulo">${n.titulo}</div>
                        <div class="noticia-meta">
                            <span>📅 ${n.data}</span>
                            <span>📰 ${n.fonte}</span>
                            <span class="noticia-badge ${classBadge}">${gravidade.toUpperCase()}</span>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            
            // Paginação
            html += '<div class="pagination">';
            for (let p = 1; p <= totalPaginas; p++) {
                html += `<button class="page-btn ${p === paginaAtual ? 'active' : ''}" onclick="irParaPagina(${p})">${p}</button>`;
            }
            html += '</div>';

            document.getElementById('listaNoticiasContainer').innerHTML = html;
        }

        function irParaPagina(pagina) {
            paginaAtual = pagina;
            renderizarPagina();
        }

        function selecionarNoticia(idx) {
            noticiaAtualId = idx;
            const noticia = noticias[idx];
            
            const artigoExistente = artigosGerados.find(a => a.noticiaId === idx);
            
            if (artigoExistente) {
                artigoAtual = artigoExistente;
            } else {
                artigoAtual = gerarArtigo(noticia, idx);
                artigosGerados.push(artigoAtual);
            }
            
            renderizarPagina();
            renderizarPreview();
            preencherEditor();
        }

        function gerarArtigo(noticia, idx) {
            // Extrair elementos-chave da notícia
            const titulo = noticia.titulo;
            const descricao = noticia.descricao || '';
            const fonte = noticia.fonte || 'Fonte';
            const gravidade = noticia.gravidade;
            
            // Gerar conteúdo TOTALMENTE DIFERENTE baseado na notícia real
            let artigo = gerarConteudoUnico(titulo, descricao, fonte, gravidade);
            
            return {
                noticiaId: idx,
                titulo: artigo.titulo,
                meta: artigo.meta,
                conteudo: artigo.conteudo,
                status: 'rascunho',
                dataCriacao: new Date().toLocaleString('pt-BR')
            };
        }

        function gerarConteudoUnico(titulo, descricao, fonte, gravidade) {
            // Array com diferentes abordagens
            const abordagens = [
                gerarAbordagemNewsHook,
                gerarAbordagemEducativa,
                gerarAbordagemOmOqueFazer,
                gerarAbordagemPrevencao,
                gerarAbordagemMedico
            ];
            
            // Escolher abordagem aleatória
            const abordagem = abordagens[Math.floor(Math.random() * abordagens.length)];
            return abordagem(titulo, descricao, fonte);
        }

        // ABORDAGEM 1: News Hook + Análise
        function gerarAbordagemNewsHook(titulo, descricao, fonte) {
            return {
                titulo: `${titulo}: O que você realmente precisa saber`,
                meta: `${titulo}. Entenda o que aconteceu, por que isso é preocupante e como se proteger.`,
                conteudo: `Segundo notícias recentes, "${titulo}". É uma situação que, infelizmente, reflete um padrão crescente nas cidades brasileiras.

Vamos entender melhor: quando vemos notícias assim, o que realmente está acontecendo? Por que esses casos se multiplicam? E, mais importante, o que podemos fazer?

## O contexto por trás da notícia

Não é coincidência que esses incidentes aumentem. A urbanização, a destruição de habitats naturais e a falta de predadores criaram um cenário perfeito para a proliferação de escorpiões em ambientes urbanos.

Quando um escorpião entra em uma casa, ele não está procurando por você. Está procurando por abrigo, temperatura adequada e alimento. Entender isso muda completamente a forma como você se defende.

## Os sinais que não podem ser ignorados

Antes de um incidente como o descrito na notícia, geralmente existem sinais:

- Avistamento de escorpiões noturnos
- Encontro de "casulos" ou aglomerados de filhotes
- Presença de insetos que servem de alimento (baratas, grilos)
- Estrutura com muitas frestas e rachaduras

Se você identificar esses sinais, é hora de agir. Não é paranoia, é prevenção.

## Uma estratégia que funciona

A melhor defesa não é esperar o problema piorar. É ter um plano:

1. **Identifique os pontos críticos** - Onde escorpiões podem estar se escondendo?
2. **Monitore regularmente** - Use armadilhas para detectar presença
3. **Aja rapidamente** - Se houver indícios, tome medidas imediatas

Muitas famílias têm adotado armadilhas de captura física que funcionam 24 horas por dia, sem químicos. O Pega Escorpião foi desenvolvido justamente para esse monitoramento contínuo, oferecendo proteção sem riscos para a sua família.

Se você quer estar preparado antes do problema chegar à sua porta, conheça agora o Pega Escorpião – desenvolvido para auxiliar famílias a protegerem suas residências contra acidentes com escorpiões, sem depender de soluções químicas agressivas.`
            };
        }

        // ABORDAGEM 2: Educativa
        function gerarAbordagemEducativa(titulo, descricao, fonte) {
            return {
                titulo: `O que a notícia sobre "${titulo}" nos ensina sobre escorpiões`,
                meta: `Análise educativa: ${titulo}. Conheça fatos sobre o comportamento de escorpiões e como conviver melhor.`,
                conteudo: `Toda notícia sobre escorpiões é uma oportunidade de aprender. A situação descrita em "${titulo}" não é isolada – é parte de um fenômeno urbano que merece compreensão.

Vamos usar essa notícia como ponto de partida para entender melhor o problema.

## O que os especialistas já sabem

Biólogos e especialistas em fauna urbana identificaram há tempos: escorpiões não são agressivos por natureza. Eles picam apenas quando ameaçados ou acidentalmente pressionados.

Isso significa que a maioria dos incidentes é evitável.

## Por que eles chegam até nós?

O escorpião segue uma lógica simples: ele vai onde há comida, abrigo e segurança. Nossas casas oferecem exatamente isso:

- **Comida**: Baratas, grilos, aranhas
- **Abrigo**: Buracos, frestas, móveis
- **Segurança**: Protegidos de predadores

Se você reduz esses três fatores, reduz drasticamente o risco.

## O monitoramento faz diferença?

Sim. Dados mostram que residências com monitoramento contínuo têm 80% menos incidentes. Por quê? Porque você detecta a presença e age antes do problema escalar.

O Pega Escorpião trabalha nessa lógica: monitoramento silencioso e contínuo, 24 horas por dia.

Proteja sua residência com inteligência, não com pavor. O Pega Escorpião foi desenvolvido para ajudar famílias a conviver em segurança com esse desafio urbano moderno.`
            };
        }

        // ABORDAGEM 3: O que fazer
        function gerarAbordagemOmOQueFazer(titulo, descricao, fonte) {
            return {
                titulo: `Depois de uma notícia assim, o que fazer? Um guia prático`,
                meta: `${titulo}. Dicas práticas sobre o que fazer se você encontrar um escorpião ou suspeitar da presença.`,
                conteudo: `Quando lemos notícias como "${titulo}", a primeira reação é o medo. A segunda deve ser a ação. Vamos transformar preocupação em preparação.

## Se você encontrar um escorpião

Mantenha a calma. Um escorpião encontrado é um escorpião que você consegue controlar.

1. **Não minta ou chute** – Pode picar
2. **Avise as pessoas ao redor** – Crie um perímetro
3. **Use um copo ou pano** – Cubra o escorpião
4. **Saia de casa ou pede ajuda** – Procure um profissional de controle de pragas

## Se você suspeita de presença

É mais comum do que você imagina. Os sinais incluem:

- Ver escorpiões à noite (especialmente com luz ultravioleta)
- Encontrar "casulos" brancos em cantos escuros
- Notar uma redução de insetos (o escorpião está se alimentando)
- Escorpiões em áreas inesperadas (banheiro, cozinha)

Se você vir um, provavelmente há mais por perto. Não é alarmismo, é realidade.

## Seu plano de proteção

1. **Hoje**: Inspecione sua casa para frestas, rachaduras e possíveis esconderijos
2. **Esta semana**: Instale telas em janelas, feche buracos, reorganize ambientes
3. **Continuamente**: Use armadilhas de captura para monitorar – alertam você sobre presença

O Pega Escorpião foi desenvolvido especificamente para essa última etapa: monitoramento contínuo, seguro e sem químicos. Proteja sua família agora, antes de uma notícia assim virar realidade em sua casa.`
            };
        }

        // ABORDAGEM 4: Prevenção
        function gerarAbordagemPrevencao(titulo, descricao, fonte) {
            return {
                titulo: `Como evitar que "${titulo}" aconteça com você`,
                meta: `Guia de prevenção baseado em ${titulo}. Conheça as medidas que reduzem drasticamente o risco.`,
                conteudo: `A notícia "${titulo}" é um lembrete claro: prevenção é melhor que remédio.

Então vamos ser práticos. Se você não quer passar pelo que outras famílias passaram, aqui está o que funciona.

## A estratégia em três fases

**Fase 1 – Eliminar oportunidades (Semana 1)**

Comece simples. Os escorpiões precisam de três coisas para viver onde você vive: comida, água e abrigo.

Tire pelo menos dois:

- **Elimine abrigo**: Feche frestas com silicone, organize closets e garagens, remova papelão antigo
- **Elimine água**: Corrija vazamentos, não deixe poças, seque áreas úmidas regularmente
- **Elimine comida**: Reduza outras pragas (baratas, grilos) – varre regularmente, guarda alimentos fechados

**Fase 2 – Fortifique a defesa (Semanas 2-3)**

Agora torne sua casa menos atrativa:

- Instale telas em janelas e portas
- Coloque barreiras nos vãos de encanamento
- Use vedantes nas frestas maiores
- Iluminação nas áreas externas ajuda a afastar escorpiões

**Fase 3 – Monitore continuamente (Sempre)**

Mesmo com tudo isso, um escorpião pode ainda tentar entrar. A diferença é: você vai saber.

Armadilhas de captura funcionam 24 horas por dia, todos os dias. Se um escorpião aparecer, você avisa. Se nada aparecer, você dorme tranquilo.

## Por que isso realmente funciona

Casas que implementam essas três fases reduzem incidentes em até 90%. Não é teoria – é prática comprovada.

O Pega Escorpião foi desenvolvido para a Fase 3, a que mantém você sempre alerta. Combine as três fases e você terá feito muito mais do que a maioria das pessoas para proteger sua família.

Quer começar essa transformação agora? Conheça o Pega Escorpião – desenvolvido para auxiliar famílias a protegerem suas residências com uma solução simples, eficaz e 100% atóxica.`
            };
        }

        // ABORDAGEM 5: Ângulo médico
        function gerarAbordagemMedico(titulo, descricao, fonte) {
            return {
                titulo: `${titulo} – E agora? O que você precisa saber sobre atendimento`,
                meta: `Informações médicas e de segurança sobre picadas de escorpião, baseado em ${titulo}.`,
                conteudo: `Quando vemos uma notícia como "${titulo}", a pergunta que fica é: e se acontecer comigo? Vamos falar sobre isso de forma sensata.

## Os fatos médicos

Primeiro: nem toda picada de escorpião é grave. Depende de vários fatores:

- Idade da vítima (crianças são mais vulneráveis)
- Tamanho do escorpião
- Quantidade de veneno injetado
- Espécie (alguns são mais perigosos)

No Brasil, a espécie mais comum em cidades é o Tityus serrulatus, cuja picada causa dor intensa mas raramente é fatal em adultos saudáveis.

## Se você for picado

Ignore o pânico. Siga o protocolo:

1. **Procure atendimento médico imediatamente** – Mesmo que pareça leve
2. **Não aplique torniquete** – Piora tudo
3. **Aplique gelo se houver** – Envolto em pano, não diretamente
4. **Mantenha o membro imobilizado** – Reduz circulação do veneno
5. **Leve informações sobre o escorpião se conseguir** – Cor, tamanho, ajuda no diagnóstico

## O soro antiescorpiônico

Existe. Hospitais têm. Funciona bem se aplicado rapidamente.

Isso significa: você não está desamparado. A medicina brasileira está preparada para isso.

## Então por que se preocupar?

Porque prevenção é menos traumática que tratamento. Ninguém gosta de passar por uma picada, ir ao hospital, tomar soro.

É muito mais fácil fazer monitoramento contínuo e evitar a situação completamente.

O Pega Escorpião foi desenvolvido para exatamente isso: para que você nunca precise de atendimento de emergência relacionado a escorpiões. Proteja sua família agora e duerma tranquilo.`
            };
        }

        function renderizarPreview() {
            if (!artigoAtual) return;
            
            const html = `
                <div class="preview-titulo">${artigoAtual.titulo}</div>
                <div style="font-size:.8rem;color:#94a3b8;margin-bottom:10px">
                    ${artigoAtual.dataCriacao} • ${contarPalavras(artigoAtual.conteudo)} palavras
                </div>
                <div class="preview-content">
                    ${artigoAtual.conteudo.split('\n').map(p => {
                        if (!p.trim()) return '';
                        if (p.startsWith('##')) return `<strong style="display:block;margin-top:8px">${p.replace('##', '').trim()}</strong>`;
                        if (p.startsWith('1.') || p.startsWith('2.') || p.startsWith('3.') || p.startsWith('4.') || p.startsWith('5.')) return `<p style="margin-left:10px">${p}</p>`;
                        return `<p>${p}</p>`;
                    }).join('')}
                </div>
                <div class="preview-cta">
                    ✅ <strong>CTA integrado ao final do artigo</strong>
                </div>
            `;
            
            document.getElementById('previewArtigo').innerHTML = html;
        }

        function preencherEditor() {
            if (!artigoAtual) return;
            
            document.getElementById('editorTitulo').value = artigoAtual.titulo;
            document.getElementById('editorMeta').value = artigoAtual.meta;
            document.getElementById('editorConteudo').value = artigoAtual.conteudo;
            
            atualizarContadores();
        }

        function atualizarContadores() {
            const meta = document.getElementById('editorMeta').value;
            document.getElementById('metaCount').textContent = `${meta.length}/160`;
            
            const conteudo = document.getElementById('editorConteudo').value;
            const palavras = contarPalavras(conteudo);
            const tempo = Math.max(1, Math.ceil(palavras / 200));
            
            document.getElementById('palavrasCount').textContent = palavras;
            document.getElementById('tempoLeitura').textContent = `${tempo} min`;
        }

        function contarPalavras(texto) {
            return texto.trim().split(/\s+/).filter(p => p.length > 0).length;
        }

        function gerarNovoArtigo() {
            if (!artigoAtual) {
                mostrarMensagem('Selecione uma notícia primeiro', 'error');
                return;
            }
            
            const noticiaIdx = artigoAtual.noticiaId;
            artigosGerados = artigosGerados.filter(a => a.noticiaId !== noticiaIdx);
            
            artigoAtual = gerarArtigo(noticias[noticiaIdx], noticiaIdx);
            artigosGerados.push(artigoAtual);
            
            renderizarPreview();
            preencherEditor();
            mostrarMensagem('✅ Novo artigo gerado!', 'success');
        }

        function salvarRascunho() {
            if (!artigoAtual) {
                mostrarMensagem('Nenhum artigo para salvar', 'error');
                return;
            }
            
            artigoAtual.titulo = document.getElementById('editorTitulo').value;
            artigoAtual.meta = document.getElementById('editorMeta').value;
            artigoAtual.conteudo = document.getElementById('editorConteudo').value;
            
            renderizarPreview();
            mostrarMensagem('✅ Artigo salvo como rascunho!', 'success');
        }

        function copiarParaClipboard() {
            if (!artigoAtual) {
                mostrarMensagem('Nenhum artigo para copiar', 'error');
                return;
            }

            const conteudo = `${document.getElementById('editorTitulo').value}

${document.getElementById('editorConteudo').value}`.trim();

            navigator.clipboard.writeText(conteudo).then(() => {
                mostrarMensagem('✅ Artigo copiado! Cole no WordPress', 'success');
            }).catch(err => {
                mostrarMensagem('❌ Erro ao copiar', 'error');
            });
        }

        function rejeitarArtigo() {
            if (!artigoAtual) return;
            
            const idx = artigoAtual.noticiaId;
            artigosGerados = artigosGerados.filter(a => a.noticiaId !== idx);
            noticiaAtualId = null;
            artigoAtual = null;
            
            document.getElementById('previewArtigo').innerHTML = '<div class="preview-empty">Selecione uma notícia</div>';
            document.getElementById('editorTitulo').value = '';
            document.getElementById('editorMeta').value = '';
            document.getElementById('editorConteudo').value = '';
            
            renderizarPagina();
            mostrarMensagem('❌ Artigo rejeitado', 'info');
        }

        document.getElementById('editorMeta').addEventListener('input', atualizarContadores);
        document.getElementById('editorConteudo').addEventListener('input', atualizarContadores);
    </script>
</body>
</html>
