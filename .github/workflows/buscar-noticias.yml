name: 🦂 Monitor Escorpiões - Busca Automática

on:
  schedule:
    - cron: '30 8,16 * * *'
  workflow_dispatch:

jobs:
  buscar_noticias:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python No caminho: scripts/buscar_noticias.py
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add noticias.json
          git commit -m "🦂 Atualizar" || true
          git push
