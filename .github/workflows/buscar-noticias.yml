name: 🦂 Monitor Escorpiões - Busca Automática

on:
  schedule:
    - cron: '30 8,16 * * *'
  workflow_dispatch:

jobs:
  buscar_noticias:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 🔍 Buscar notícias
        run: python scripts/buscar_noticias.py
      
      - name: 📤 Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add noticias.json
          git commit -m "🦂 Atualizar notícias - $(date '+%d/%m/%Y %H:%M')" || echo "Sem mudanças"
          git push
